version: "3.8"

services:
  backend:
    build:
      context: ./Ignition-backend
    container_name: ignition-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    container_name: ignition-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: